services:
  arma3:
    image: ghcr.io/brettmayson/arma3server/arma3server:latest
    platform: linux/amd64
    container_name: a3_automod
    restart: unless-stopped
    init: true

    ports:
      - "2302:2302/udp"
      - "2303:2303/udp"
      - "2304:2304/udp"
      - "2305:2305/udp"
      - "2306:2306/udp"

    labels:
      - "portical.upnp.forward=published"

    volumes:
      - arma3_armada_config:/arma3/configs
      - a3_server:/arma3
      - a3_missions:/arma3/mpmissions

      - a3_addons:/arma3/addons
      - a3_argo:/arma3/argo
      - a3_enoch:/arma3/enoch
      - a3_expansion:/arma3/expansion
      - a3_heli:/arma3/heli
      - a3_jets:/arma3/jets
      - a3_orange:/arma3/orange

      - type: volume
        source: a3_mod_storage
        target: /arma3/servermods
        read_only: true
        volume:
          nocopy: true

    depends_on:
      mod_storage_init:
        condition: service_completed_successfully
      mod_downloader:
        condition: service_healthy

    environment:
      ARMA_BINARY: "${ARMA_BINARY}"
      ARMA_CDLC: "${ARMA_CDLC}"
      ARMA_CONFIG: "${ARMA_CONFIG}"
      ARMA_LIMITFPS: "${ARMA_LIMITFPS}"
      ARMA_PARAMS: "${ARMA_PARAMS}"
      ARMA_PROFILE: "${ARMA_PROFILE}"
      ARMA_WORLD: "${ARMA_WORLD}"
      HEADLESS_CLIENTS: "${HEADLESS_CLIENTS}"
      HEADLESS_CLIENTS_PROFILE: "${HEADLESS_CLIENTS_PROFILE}"
      MODS_LOCAL: "${MODS_LOCAL}"
      PORT: "${PORT}"
      STEAM_BRANCH: "${STEAM_BRANCH}"
      STEAM_BRANCH_PASSWORD: "${STEAM_BRANCH_PASSWORD}"
      STEAM_PASSWORD: "${STEAM_PASSWORD}"
      STEAM_USER: "${STEAM_ACCOUNT}"

  mod_storage_init:
    image: alpine:3.22
    container_name: a3_mod_storage_init
    restart: "no"

    environment:
      APP_ID: "${APP_ID:-107410}"
      MOD_STORAGE_DIR: "${MOD_STORAGE_DIR:-.storage}"

    volumes:
      - type: volume
        source: a3_mod_storage
        target: /storage
        volume:
          nocopy: true

    entrypoint:
      - /bin/sh
      - -eu
      - -c
      - |
        workshop_dir="/storage/$${MOD_STORAGE_DIR}/workshop/$${APP_ID}"
        migration_marker="/storage/$${MOD_STORAGE_DIR}/.layout-v1"

        mkdir -p "$${workshop_dir}"

        # Jednorazowa migracja istniejących modów z głównego katalogu
        # starego wolumenu a3_raw_mods.
        if [ ! -f "$${migration_marker}" ]; then
          echo "Migracja istniejących modów do $${workshop_dir}"

          find /storage \
            -mindepth 1 \
            -maxdepth 1 \
            ! -name "$${MOD_STORAGE_DIR}" \
            -exec mv {} "$${workshop_dir}/" \;

          touch "$${migration_marker}"
        fi

  mod_downloader:
    image: steamcmd/steamcmd:ubuntu-22
    platform: linux/amd64
    container_name: mod_dl
    restart: unless-stopped
    init: true
    depends_on:
     mod_storage_init:
       condition: service_completed_successfully

    working_dir: /work

    volumes:
      - ./:/work:ro
      - a3_preset:/data/preset

      # Cały przenośny wolumen z magazynem i symlinkami
      - type: volume
        source: a3_mod_storage
        target: /arma3/servermods
        volume:
          nocopy: true

      # SteamCMD zapisuje bezpośrednio do podkatalogu tego samego wolumenu
      - type: volume
        source: a3_mod_storage
        target: /root/Steam/steamapps/workshop/content/107410
        volume:
          nocopy: true
          subpath: "${MOD_STORAGE_DIR:-.storage}/workshop/${APP_ID:-107410}"

    environment:
      APP_ID: "${APP_ID:-107410}"
      PRESET_DIR: "${PRESET_DIR:-/data/preset}"
      WORKSHOP_DIR: "${WORKSHOP_DIR:-/root/Steam/steamapps/workshop/content/107410}"
      TARGET_DIR: "${TARGET_DIR:-/arma3/servermods}"
      MOD_STORAGE_DIR: "${MOD_STORAGE_DIR:-.storage}"
      STEAMCMD: "${STEAMCMD:-steamcmd}"
      STEAM_LOGIN: "${STEAM_ACCOUNT}"
      STEAM_PASSWORD: "${STEAM_PASSWORD}"
    healthcheck:
      test:
        - CMD-SHELL
        - test -f /arma3/servermods/.mods-ready
      interval: 10s
      timeout: 3s
      retries: 720
      start_period: 10s


    entrypoint:
      - /bin/bash
      - -lc
      - |
        set -euo pipefail
        trap 'exit 0' TERM INT
        while true; do
          bash /work/mod_dl.sh
          echo "Czekam 8h do następnego uruchomienia..."
          sleep 8h
        done

  filebrowser:
    image: filebrowser/filebrowser:v2-s6
    container_name: filebrowser
    restart: unless-stopped

    ports:
      - "8088:80"

    environment:
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"

    volumes:
      - a3_missions:/srv/misje
      - arma3_armada_config:/srv/config
      - a3_preset:/srv/preset
      - filebrowser_database:/database
      - filebrowser_config:/config
volumes:
  arma3_armada_config:
    name: arma3_armada_config
  a3_server:
    name: a3_server

  a3_missions:
    name: a3_missions

  a3_addons:
    name: a3_addons

  a3_argo:
    name: a3_argo

  a3_enoch:
    name: a3_enoch

  a3_expansion:
    name: a3_expansion

  a3_heli:
    name: a3_heli

  a3_jets:
    name: a3_jets

  a3_orange:
    name: a3_orange

  a3_preset:
    name: a3_preset

  a3_mod_storage:
      name: a3_raw_mods

  filebrowser_database:
    name: filebrowser_database

  filebrowser_config:
    name: filebrowser_config
